<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEGAN MD | PAIR CODE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #9932cc;
            --accent: #ff69b4;
            --text: #ffffff;
            --text-light: #d3d3d3;
            --background: #121212;
            --card-bg: #1e1e1e;
            --input-bg: #2d2d2d;
            --success: #4caf50;
            --error: #f44336;
            --shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: var(--transition);
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--background);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1.6;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(138, 43, 226, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 105, 180, 0.1) 0%, transparent 20%);
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(138, 43, 226, 0.2);
            animation: fadeIn 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(138, 43, 226, 0.1) 0%,
                rgba(255, 105, 180, 0.05) 50%,
                transparent 100%
            );
            transform: rotate(30deg);
            z-index: -1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .home-btn {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            font-weight: 600;
            text-decoration: none;
            box-shadow: var(--shadow);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(138, 43, 226, 0.4);
        }

        .home-btn:active {
            transform: translateY(0);
        }

        h1 {
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-size: 2.2rem;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.3);
        }

        .subtitle {
            color: var(--text-light);
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text);
        }

        .input-container {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 12px;
            overflow: hidden;
        }

        .country-code {
            background: rgba(138, 43, 226, 0.2);
            padding: 15px;
            color: var(--primary);
            font-weight: 600;
            border-right: 1px solid var(--primary);
        }

        .input-container input {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
        }

        .input-container input:focus {
            outline: none;
        }

        .input-container input::placeholder {
            color: rgba(200, 200, 200, 0.5);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(138, 43, 226, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            transform: translateY(0);
            cursor: not-allowed;
        }

        .result {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(138, 43, 226, 0.1);
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            display: none;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .code-label {
            color: var(--text-light);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .code-display {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 4px;
            margin: 1rem 0;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.3);
            word-break: break-word;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 1rem;
        }

        .copy-btn:hover {
            background: var(--primary);
            color: white;
        }

        .copy-btn:active {
            transform: scale(0.98);
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: var(--error);
            margin-top: 0.5rem;
            font-size: 0.9rem;
            display: none;
        }

        .footer {
            margin-top: 2rem;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
            box-shadow: 0 0 20px var(--primary);
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(138, 43, 226, 0.3);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <a href="./" class="home-btn">
        <i class="fas fa-home"></i> Home
    </a>

    <div class="container">
        <h1>MEGAN PAIR</h1>
        <p class="subtitle">Enter your WhatsApp number to get pairing code</p>

        <div class="input-group">
            <label>Phone Number</label>
            <div class="input-container">
                <span class="country-code">+</span>
                <input type="tel" id="phone" placeholder="254XXXXXXXXX" value="254" inputmode="numeric">
            </div>
        </div>

        <button class="btn" id="generateBtn">
            <span id="btnText">Generate Code</span>
            <span id="btnLoader" class="loader" style="display: none;"></span>
        </button>

        <div class="result" id="result">
            <div class="code-label">Your pairing code:</div>
            <div class="code-display" id="codeDisplay"></div>
            <button class="copy-btn" id="copyBtn">
                <i class="fas fa-copy"></i> Copy Code
            </button>
        </div>

        <div class="error" id="error"></div>

        <div class="footer">
            <p>Powered by <a href="https://whatsapp.com/channel/0029VbCWWXi9hXF2SXUHgZ1b" target="_blank">Tracker Wanga</a></p>
        </div>
    </div>

    <div class="toast" id="toast">Copied!</div>

    <script>
        const phoneInput = document.getElementById('phone');
        const generateBtn = document.getElementById('generateBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const resultDiv = document.getElementById('result');
        const codeDisplay = document.getElementById('codeDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const errorDiv = document.getElementById('error');
        const toast = document.getElementById('toast');

        phoneInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        generateBtn.addEventListener('click', generateCode);

        async function generateCode() {
            const phone = phoneInput.value.replace(/\D/g, '');

            if (!phone || phone.length < 7) {
                showError('Enter valid number with country code');
                return;
            }

            generateBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline-block';
            resultDiv.style.display = 'none';
            errorDiv.style.display = 'none';

            try {
                const response = await fetch(`/code?number=${phone}`);
                const data = await response.json();

                if (data.code) {
                    codeDisplay.textContent = data.code;
                    resultDiv.style.display = 'block';
                } else {
                    showError('Failed to generate code');
                }
            } catch (err) {
                showError('Network error. Try again.');
            } finally {
                generateBtn.disabled = false;
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
            }
        }

        copyBtn.addEventListener('click', () => {
            const code = codeDisplay.textContent;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(code).then(() => {
                    showToast('Copied!');
                    copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                    setTimeout(() => {
                        copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy Code';
                    }, 2000);
                });
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = code;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('Copied!');
            }
        });

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = window.innerWidth < 768 ? 15 : 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');

                const size = Math.random() * 8 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;

                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;

                const duration = Math.random() * 15 + 15;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${Math.random() * 5}s`;

                particle.style.opacity = Math.random() * 0.3 + 0.1;

                particlesContainer.appendChild(particle);
            }
        }

        createParticles();
    </script>
</body>
  </html>
